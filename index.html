<!DOCTYPE html>
<html>
<head>
  <title>MIXED HUB</title>

  <!-- Premium Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="brand">
    <img src="./images/logo.png" alt="logo">
    <h1>MIXED HUB</h1>
  </div>

  <button class="cart-btn" onclick="toggleCart()">
    🛒 Cart (<span id="count">0</span>)
  </button>
</header>
  
<section class="hero">
  <div class="hero-content">
    <h1>Welcome to Mixed Hub</h1>
    <p>Premium Quality Products for You</p>

    <a href="#products" class="hero-btn">Shop Now</a>

    <!-- 👇 ye arrow add karo -->
    <div class="arrow-down">↓</div>
  </div>
</section>
  
<section class="products" id="products">

  <div class="card">
    <img src="./images/p1.jpg">
    <h2>Watch</h2>
    <p>Rs 5000</p>
    <button onclick="addToCart('Watch',5000)">Add to Cart</button>
  </div>

  <div class="card">
    <img src="./images/p2.jpg">
    <h2>Shoes</h2>
    <p>Rs 3000</p>
    <button onclick="addToCart('Shoes',3000)">Add to Cart</button>
  </div>

</section>

<div id="cartBox" class="cart">
  <span class="close-btn" onclick="toggleCart()">✖</span>

  <h2>Your Cart</h2>
  <ul id="cartItems"></ul>
  <h3 id="total"></h3>

  <button onclick="checkout()">Buy Now</button>
</div>

<footer class="footer">
  <a href="https://wa.me/923361236765" target="_blank">WhatsApp Support</a>

  <p>Payment:</p>
  <p>EasyPaisa / JazzCash / Bank Transfer</p>
</footer>

<script src="script.js"></script>
</body>
</html>
