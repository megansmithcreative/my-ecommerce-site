<!DOCTYPE html>
<html>
<head>
  <title>MIXED HUB</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="brand">
    <img src="./images/logo.png">
    <h1>MIXED HUB</h1>
  </div>

  <button class="cart-btn" onclick="toggleCart()">
    🛒 Cart (<span id="count">0</span>)
  </button>
</header>

<!-- HERO -->
  <video autoplay muted loop class="bg-video">
  <source src="./images/video.mp4" type="video/mp4">
</video>
  
<section class="hero">
  <div class="hero-content">
    <h1>Welcome to Mixed Hub</h1>
    <p>Premium Quality Products for You</p>

    <a href="#products" class="hero-btn">Shop Now</a>
    <div class="arrow-down">↓</div>
  </div>
</section>

<!-- PRODUCTS -->
<section class="products" id="products">

  <div class="card" onclick="openProduct('watch.html')">
  <img src="./images/p1.jpg">
  <h2>Watch</h2>
  <p>Rs 5000</p>

  <button onclick="event.stopPropagation(); addToCart('Watch',5000,this)">
    Add to Cart
  </button>
</div>

  <div class="card">
    <img src="./images/p2.jpg">
    <h2>Shoes</h2>
    <p>Rs 3000</p>
    <button onclick="addToCart('Shoes',3000,this)">Add to Cart</button>
  </div>

</section>

<!-- CART -->
<div id="cartBox" class="cart">
  <span class="close-btn" onclick="toggleCart()">✖</span>

  <h2>Your Cart</h2>
  <ul id="cartItems"></ul>
  <h3 id="total"></h3>

  <button onclick="checkout()">Buy Now</button>
</div>

<!-- FOOTER -->
<footer class="footer">
  <a href="https://wa.me/923361236765" target="_blank">WhatsApp Support</a>
  <p>Payment: EasyPaisa / JazzCash / Bank Transfer</p>
</footer>

<script src="script.js"></script>

</body>
</html>
