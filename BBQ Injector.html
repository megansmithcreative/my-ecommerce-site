<!DOCTYPE html>
<html>
<head>
  <title>BBQ Injector</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .product-page {
      display: flex;
      gap: 40px;
      padding: 50px;
      flex-wrap: wrap;
    }

    .product-media img,
    .product-media video {
      width: 300px;
      border-radius: 10px;
    }

    .product-info {
      max-width: 400px;
    }
  </style>
</head>

<body>

<h1 style="text-align:center;">BBQ Injector</h1>

<div class="product-page">

  <div class="product-media">
    <img src="./images/BBQ Injector.jpg">

    <br><br>

    <video controls>
      <source src="./images/BBQ Injector.mp4" type="video/mp4">
    </video>
  </div>

  <div class="product-info">
    <h2>Price: Rs 800</h2>

    <p>
      High quality BBQ injector for perfect flavor injection.
      Durable material, easy to use.
    </p>

    <button onclick="addToCart('BBQ Injector',800,this)">
      Add to Cart
    </button>

    <br><br>
    <a href="index.html">⬅ Back</a>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
